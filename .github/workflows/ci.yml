name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck

  migrations:
    name: Validate Migrations
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase init --workdir . || true
      - run: supabase db start
      - run: supabase db reset

  deploy-migrations:
    name: Deploy Migrations
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  preview:
    name: EAS Update Preview
    if: github.event_name == 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --branch "pr-${{ github.event.pull_request.number }}" --message "${{ github.event.pull_request.title }}"
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_CLUTCH_API_URL: ${{ secrets.EXPO_PUBLIC_CLUTCH_API_URL }}

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        id: eas-update
        run: |
          OUTPUT=$(pnpm eas update --branch main --message "${{ github.event.head_commit.message }}" --json 2>/dev/null)
          echo "group_id=$(echo "$OUTPUT" | jq -r '.[0].group')" >> "$GITHUB_OUTPUT"
          echo "runtime_version=$(echo "$OUTPUT" | jq -r '.[0].runtimeVersion')" >> "$GITHUB_OUTPUT"
          echo "created_at=$(echo "$OUTPUT" | jq -r '.[0].createdAt')" >> "$GITHUB_OUTPUT"
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
          EXPO_PUBLIC_CLUTCH_API_URL: ${{ secrets.EXPO_PUBLIC_CLUTCH_API_URL }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          SHORT_SHA=${GITHUB_SHA::7}
          TAG="v${VERSION}+${SHORT_SHA}"
          PROJECT_ID="8925e5e6-06a5-4a92-8044-9775e6e9e256"
          GROUP_ID="${{ steps.eas-update.outputs.group_id }}"
          RUNTIME="${{ steps.eas-update.outputs.runtime_version }}"
          CREATED="${{ steps.eas-update.outputs.created_at }}"
          MESSAGE="${{ github.event.head_commit.message }}"

          PREVIEW_URL="https://expo.dev/preview/update?message=$(printf '%s' "$MESSAGE" | jq -sRr @uri)&updateRuntimeVersion=$(printf '%s' "$RUNTIME" | jq -sRr @uri)&createdAt=$(printf '%s' "$CREATED" | jq -sRr @uri)&slug=exp&projectId=${PROJECT_ID}&group=${GROUP_ID}"
          ENCODED_PREVIEW=$(printf '%s' "$PREVIEW_URL" | jq -sRr @uri)
          QR_URL="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${ENCODED_PREVIEW}"

          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          git tag -f latest
          git push origin latest

          gh release create latest \
            --title "Latest — ${TAG}" \
            --latest \
            --notes "$(cat <<BODY
          ## Try it

          Install [Expo Go](https://expo.dev/go) and scan:

          ![QR Code](${QR_URL})

          Or open directly: [Preview in Expo Go](${PREVIEW_URL})
          BODY
          )"
